                <div class="review-quote">Земля держится не только на законах физики – она держится на людях. На тех, кто строит будущее. Строители – первые, кто делает космос возможным. Их разработки – это шаги к звездам. Первый космодром был построен именно представителями этой профессии. И здесь «строитель» раскрывается как ключ к выживанию человечества. Не просто профессия – миссия.</div>

                <div class="review-quote">Сегодня, создавая закон о креативных индустриях, мы говорим: культура – это не только театры и фильмы. Это - среда, которая рождает таланты. Сергей Федоренко показал роль строителей в этом оркестре. Их этика, их видение будущего – основа, на которой расцветает наука, искусство и культура.</div>

<script>
    const blocks = ['home', 'philosophy', 'book', 'contest', 'audiobook', 'news', 'reviews', 'about-us', 'contact', 'footer'];

        const wrapper = document.getElementById(id);
        const tmpl = document.getElementById('tmpl-' + id);
        if (wrapper && tmpl) {
            const shadow = wrapper.attachShadow({mode: 'open'});
            shadow.appendChild(tmpl.content.cloneNode(true));

            shadow.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        targetEl.scrollIntoView({behavior: 'smooth'});
                    }
                });
            });
        }
    });
